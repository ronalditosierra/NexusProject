<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;500;700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <title>Feliz Cumpleaños</title>
</head>

<body>

  <div class="container">

    <h1 class="title">
      <span class="letter">Feliz</span>
      <span class="letter"> Cumpleaños</span>
    </h1>

    <p class="subtitle">Hoy celebramos lo hermosa que eres por dentro y por fuera ✨</p>

    <!-- SOBRE -->
    <div class="envelope-wrapper">
      <div class="envelope" id="envelope">
        <div class="letter-paper">
          <p>
            Feliz cumpleaños a la doctora mas linda y mas parchada,
            que tengas un hermoso día tan lindo como tú.
            Att: el Ing.💖
          </p>
        </div>
      </div>
      <p class="click-text">Haz click en el sobre 💌</p>
    </div>

  </div>

  <!-- TULIPANES DECORATIVOS -->
  <div class="flowers">
    🌷 🌷 🌷 🌷 🌷 🌷 🌷 🌷 🌷 🌷
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="script.js"></script>

</body>

</html>
